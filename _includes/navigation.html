<nav class="nav__list">
  {% if site.data.navigation.main %}
    <ul class="nav__items">
      {% for link in site.data.navigation.main %}
        <li class="nav__item">
          <a href="{{ link.url | relative_url }}" {% if link.url == page.url %}class="active"{% endif %}>
            {{ link.title }}
          </a>
        </li>
      {% endfor %}
    </ul>
  {% endif %}
</nav>

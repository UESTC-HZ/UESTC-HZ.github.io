title: "DICT"
name: "Digital & Intelligence Convergence Team"
description: "数智融合创新研究团队"

# Minimal Mistakes Theme
remote_theme: mmistakes/minimal-mistakes@4.24.0
minimal_mistakes_skin: "air"

# Site Settings
locale: "en-US"
markdown: kramdown

# Site Author
author:
  name: "DICT Team"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/UESTC-HZ"

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: false
      share: false
      comments: false

# Navigation
nav:
  - title: "Home"
    url: "/"
  - title: "About"
    url: "/about/"
  - title: "People"
    url: "/people/"
  - title: "Research"
    url: "/research/"
  - title: "Publications"
    url: "/publications/"
  - title: "Projects"
    url: "/projects/"
  - title: "Students"
    url: "/students/"
  - title: "News"
    url: "/news/"
  - title: "Contact"
    url: "/contact/"